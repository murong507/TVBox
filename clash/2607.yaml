rules:
  # DIRECT策略组：不走代理直接连接（根据个人需求自由添加）
  - DOMAIN-SUFFIX,msftconnecttest.com,DIRECT
  - DOMAIN-SUFFIX,msftncsi.com,DIRECT
  - DOMAIN-SUFFIX,steamserver.net,DIRECT
  - DOMAIN-SUFFIX,steamcontent.com,DIRECT
  - DOMAIN,stun.l.google.com,DIRECT
  - DOMAIN-SUFFIX,edu.cn,DIRECT
  - DOMAIN-SUFFIX,v6.navy,DIRECT
  - DOMAIN-SUFFIX,dynv6.com,DIRECT

  # ===== 你手动指定的特殊域名，优先级最高 =====
  - DOMAIN-SUFFIX,linux.do,节点选择

  # AI-PROXY策略组：适用于ChatGPT、Claude等AI服务（可根据需要添加或删除）
  - DOMAIN-KEYWORD,gemini,AI
  - DOMAIN-SUFFIX,ping0.cc,AI
  - DOMAIN-SUFFIX,ipdata.co,AI
  - DOMAIN-SUFFIX,pingip.cn,AI
  - DOMAIN-SUFFIX,copilot.microsoft.com,AI
  - DOMAIN-SUFFIX,ciciai.com,狮城节点
  - DOMAIN-SUFFIX,cici.com,狮城节点
  - DOMAIN-SUFFIX,anthropic.com,AI
  - DOMAIN-SUFFIX,perplexity.ai,AI
  - RULE-SET,AI-Rules,AI
  - RULE-SET,gemini-Rules,AI
  - DOMAIN-SUFFIX,proactivebackend-pa.googleapis.com,AI
  # PROXY策略组：需要代理访问的域名（根据个人需求自由添加）
  - DOMAIN-SUFFIX,live.com,节点选择
  - DOMAIN-SUFFIX,teracloud.jp,节点选择

  # ===== 各平台精细分流：继续保留（比 geosite:global 嗯精细多了）=====
  - GEOSITE,cursor,AI
  - GEOSITE,spotify,Spotify
  - GEOSITE,apple,Apple
  - GEOSITE,google,Google
  - GEOSITE,github,Github
  - GEOSITE,youtube,国外视频
  - GEOSITE,netflix,国外视频
  - GEOSITE,disney,国外视频
  - GEOSITE,hbo,国外视频
  - GEOSITE,primevideo,国外视频
  - GEOSITE,twitch,国外视频
  - GEOSITE,microsoft,Microsoft
  - GEOSITE,telegram,Telegram
  - GEOSITE,reddit,节点选择
  - GEOSITE,twitter,Twitter
  - GEOSITE,instagram,Instagram
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,category-games@cn,DIRECT
  - GEOSITE,category-ai-!cn,AI
  - GEOSITE,category-ai-cn,DIRECT
  - GEOSITE,onedrive,DIRECT
  - GEOSITE,private,DIRECT

  # 国外站中有“国内加速/镜像”的部分 → 直连
  - GEOSITE,geolocation-!cn@cn,DIRECT
  # 剩下的正宗国外站 → 统一走你自己的总代理（建议用 节点选择）
  - GEOSITE,geolocation-!cn,节点选择
  # 国内站中“必须从国外访问”的那部分 → 走代理
  - GEOSITE,geolocation-cn@!cn,节点选择
  # 剩下常规国内站 → 直连
  - GEOSITE,geolocation-cn,DIRECT

  # ===== 最终兜底 =====
  # ===== 局域网直连 =====
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,telegram,Telegram,no-resolve
  - GEOIP,CN,DIRECT
  # 如果你坚持用 漏网之鱼 select 分组，也可以：
  - MATCH,漏网之鱼
