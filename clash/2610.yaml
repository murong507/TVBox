# Clash 配置文件 - mihomo.yaml


#订阅链接
proxy-providers:
  魅影:
    type: http
    url: "__MEIYING_URL__"
    interval: 3600
    path: "./providers/魅影.yaml"
    override:
      udp: true
    health-check:
      enable: true
      interval: 300
      url: https://www.gstatic.com/generate_204

  云洞:
    type: http
    url: "__YUNDONG_URL__"
    interval: 7200
    path: "./providers/云洞.yaml"
    override:
      udp: true
    health-check:
      enable: true
      interval: 300
      url: https://www.gstatic.com/generate_204

# ----------------- Clash 高级参数配置 start ----------------- #
profile:
  store-selected: true         # 记忆并恢复之前所选的代理节点
  store-fake-ip: true          # 持久化 Fake-IP 数据，防止软路由/系统重启时内网 IP 紊乱

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://proxy.hmhi.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://proxy.hmhi.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"

dns:
  direct-nameserver:
  - "https://dns.alidns.com/dns-query#h3=true"
  - "https://doh.pub/dns-query"
  default-nameserver:
  - https://223.5.5.5/dns-query#h3=true
  - https://119.29.29.29/dns-query#h3=true
  nameserver:
  - "https://dns.alidns.com/dns-query#h3=true"
  - "https://doh.pub/dns-query"
  proxy-server-nameserver:
  - "https://dns.alidns.com/dns-query#h3=true"
  - "https://doh.pub/dns-query"
  fallback:
  - "https://dns.cloudflare.com/dns-query#🇭🇰 香港(云洞)"
  - "https://doh.dns.sb/dns-query#🇭🇰 香港(云洞)"
  - "https://dns.twnic.tw/dns-query#🇭🇰 香港(云洞)"
  - "tls://8.8.8.8:853#🇭🇰 香港(云洞)"

  fake-ip-range: 198.18.0.0/15
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    # 常用 Fake IP filter 域名
    - ruleset:fakeip_filter
    # BT/PT
    - "geosite: category-public-tracker,tracker"
    # Microsoft && Apple
    - "geosite: microsoft,onedrive,apple,icloud"
    # 游戏平台（Steam、Epic、PS等）
    - "geosite: steam,epicgames,xbox,playstation,origin,category-games-cn,category-games-!cn,category-games,category-game-accelerator-cn,category-game-platforms-download"
    # Google
    - "geosite: google-cn,google-play@cn"
    # 其他
    - "geosite: private,jsdelivr,category-ntp@cn,category-ddns,category-speedtest@cn,nvidia@cn,paypal@cn,cn"
    - "+.lan"
    - "+.local"
    - "+.push.apple.com"
    - "+.pub.3gppnetwork.org"
    # 解决 Windows 连通性检测问题
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    # 解决 返回ip地址的域名被误判为国外域名的问题
    - "+.hmhi.top"

  fallback-filter:
    geoip: true
    geoip-code: cn
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/3
      - ::/127
      - fc00::/7
      - fe80::/10
      - ff00::/8

# ----------------- Clash 高级参数配置 end ----------------- #
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - ♻️ 自动选择
      - DIRECT
      - 🇭🇰 香港(魅影)
      - 🇭🇰 香港(云洞)
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇯🇵 日本
      - 🇺🇸 美国
      - 🌐 其他地区
      - 🎮 游戏专用

  - name: ♻️ 自动选择
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50
    use:
      - 魅影
    filter: '^(?=.*(?i)(HK|Hong Kong|香港|港))(?!.*(?i)(2x|4x)).*$'

  - name: "📺 国外媒体"
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港(魅影)
      - 🚀 节点选择
      - 🇭🇰 香港(云洞)
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇯🇵 日本
      - 🇺🇸 美国

  - name: "🎮 游戏专用"
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50
    proxies:
      - DIRECT
    use:
      - 魅影
      - 云洞
    filter: '(?i)(U-4x-BGP-HK|U-2x-BGP-HK|香港-IEPL-Pro)'

  - name: "Ⓜ️ 微软服务"
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - 🎮 游戏专用

  - name: "🤖 AI节点"
    type: url-test
    url: 'https://chatgpt.com/favicon.ico'
    interval: 300
    tolerance: 100
    use:
      - 魅影
      - 云洞
    filter: '(?i)(US|America|United States|美国|美|SG|Singapore|新加坡|狮城|坡|JP|Japan|日本|gpt|openai)'

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: "🚫 广告屏蔽"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - 🇭🇰 香港(云洞)
      - 🚀 节点选择
      - DIRECT
      - ♻️ 自动选择
      - 🇭🇰 香港(魅影)
      - 🇯🇵 日本
      - 🇺🇸 美国
      - 🎮 游戏专用

  - name: 🇭🇰 香港(魅影)
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    use:
      - 魅影
    filter: '^(?=.*(?i)(HK|Hong Kong|香港|港))(?!.*(?i)(2x|4x)).*$'

  - name: 🇭🇰 香港(云洞)
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    use:
      - 云洞
    filter: '(?i)(HK|Hong Kong|香港|港)'

  - name: 🇹🇼 台湾
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    use:
      - 魅影
      - 云洞
    filter: '(?i)(TW|Taiwan|台湾|台)'

  - name: 🇸🇬 新加坡
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    use:
      - 魅影
      - 云洞
    filter: '^(?=.*(?i)(SG|Singapore|新加坡|狮城|坡))(?!.*(?i)(2x|4x)).*$'

  - name: 🇯🇵 日本
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    use:
      - 魅影
      - 云洞
    filter: '^(?=.*(?i)(JP|Japan|日本|川日|东京|大阪|泉日|埼玉|沪日|深日))(?!.*(?i)(2x|4x)).*$'

  - name: 🇺🇸 美国
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    use:
      - 魅影
      - 云洞
    filter: '^(?=.*(?i)(US|America|United States|美国|美))(?!.*(?i)(2x|4x)).*$'

  - name: 🌐 其他地区
    type: select
    use:
      - 魅影
      - 云洞
    filter: '^(?!.*(?i)(HK|Hong Kong|香港|港|TW|Taiwan|台湾|台|SG|Singapore|新加坡|狮城|坡|JP|Japan|日本|US|America|United States|美国|美|流量|剩余|应急|官网|套餐)).*$'

  - name: "🔀 非标端口"
    type: select
    proxies:
      - DIRECT
      - 🐟 漏网之鱼

rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
  class: &class { type: http, interval: 86400, behavior: classical, format: text }

rule-providers:
  # 中国 IP 段，用于 GEOIP 规则匹配
  cn_ip:
    <<: *ip
    url: "https://proxy.hmhi.top/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"

  # 用于 Fake IP 过滤
  fakeip_filter:
    <<: *domain
    url: "https://proxy.hmhi.top/https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"

    
  Custom_Direct:
    type: http
    behavior: classical
    url: 'https://proxy.hmhi.top/https://raw.githubusercontent.com/mmm1h/clashconfig/main/rules/Direct.list'
    path: ./ruleset/Direct.yaml
    interval: 86400
    format: text

  Custom_US:
    type: http
    behavior: classical
    url: 'https://proxy.hmhi.top/https://raw.githubusercontent.com/mmm1h/clashconfig/main/rules/US.list'
    path: ./ruleset/US.yaml
    interval: 86400
    format: text
  Custom_AI:
    type: http
    behavior: classical
    url: 'https://proxy.hmhi.top/https://raw.githubusercontent.com/mmm1h/clashconfig/main/rules/AI.list'
    path: ./ruleset/AI.yaml
    interval: 86400
    format: text
  Custom_JP:
    type: http
    behavior: classical
    url: 'https://proxy.hmhi.top/https://raw.githubusercontent.com/mmm1h/clashconfig/refs/heads/main/rules/JP.list'
    path: ./ruleset/JP.yaml
    interval: 86400
    format: text
  Custom_Rules:
    type: http
    behavior: classical
    url: 'https://proxy.hmhi.top/https://raw.githubusercontent.com/mmm1h/clashconfig/main/rules/Rules.list'
    path: ./ruleset/Rules.yaml
    interval: 86400
    format: text
  Custom_Port_Direct:
    type: http
    behavior: classical
    url: "https://proxy.hmhi.top/https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Port_Direct.yaml"
    path: ./rule_provider/Custom_Port_Direct.yaml
    interval: 86400
    # format: text payload格式，无须转换
    proxy: DIRECT

