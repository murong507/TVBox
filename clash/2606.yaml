proxy-providers:
  airport1:
    type: http
    url: https://sub01.fkknet.cn/api/v1/client/subscribe?token=fdac89efeaaa5679e26213fc80241537
    interval: 86400
    health-check:
      enable: true
      interval: 600
      url:  https://www.gstatic.com/generate_204

port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
dns:
    enable: true
    ipv6: false
    default-nameserver: [223.5.5.5, 119.29.29.29, 114.114.114.114]
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    fake-ip-filter: ['*.lan', localhost.ptlogin2.qq.com]
    use-hosts: true
    respect-rules: true
    proxy-server-nameserver: [223.5.5.5, 119.29.29.29, 114.114.114.114,'https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query', 'tls://dot.pub']
    nameserver: [223.5.5.5, 119.29.29.29, 114.114.114.114, 'https://doh.pub/dns-query', 'tls://dot.pub', 'https://223.5.5.5/dns-query', 'https://223.6.6.6/dns-query', 'tls://dns.alidns.com', 'tls://223.5.5.5:853', 'https://dns.alidns.com/dns-query', 'https://9.9.9.9/dns-query', 'https://101.101.101.101/dns-query']
    fallback: [1.1.1.1, 8.8.8.8, 'https://doh.pub/dns-query', 'tls://dot.pub', 'https://223.5.5.5/dns-query', 'https://223.6.6.6/dns-query', 'tls://dns.alidns.com', 'tls://223.5.5.5:853', 'tls://223.6.6.6:853','https://9.9.9.9/dns-query', 'https://101.101.101.101/dns-query', 'https://doh.dns.sb/dns-query', 'https://dns.cloudflare.com/dns-query', 'https://dns.google/dns-query']
    fallback-filter: { geoip: true, geoip-code: CN, geosite: [gfw], ipcidr: [240.0.0.0/4, 0.0.0.0/32], domain: [+.google.com, +.facebook.com, +.youtube.com] }

